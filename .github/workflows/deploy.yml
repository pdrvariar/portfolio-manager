name: "Deploy to Hostinger"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixar o código do repositório
      - name: "Checkout code"
        uses: actions/checkout@v3

      # 2. Configurar o ambiente PHP 8.2
      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, gd, pdo_mysql, bcmath, zip
          tools: composer:v2

      # 3. Cache das dependências para acelerar o processo
      - name: "Cache Composer dependencies"
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}

      # 4. Instalar as dependências de PRODUÇÃO no GitHub Actions
      - name: "Install dependencies"
        run: |
          composer install --no-dev --prefer-dist --optimize-autoloader --no-progress
          composer dump-autoload --optimize

      # 5. TRANSFERÊNCIA DE ARQUIVOS (Passo crucial que faltava)
      # Isso envia tudo, incluindo a pasta 'vendor' gerada acima, para o servidor
      - name: "Copy files via SCP"
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "./*"
          # Caminho extraído do seu script original
          target: "/home/${{ secrets.HOSTINGER_USERNAME }}/domains/smartreturns.com.br/public_html"
          # Ignora arquivos desnecessários na produção
          rm: false
          strip_components: 0


      # 6. Comandos Pós-Deploy via SSH
      - name: "Finalize Deploy via SSH"
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            SITE_PATH="/home/${{ secrets.HOSTINGER_USERNAME }}/domains/smartreturns.com.br/public_html"
            cd $SITE_PATH
            
            # 6.1. Ajustar permissões de segurança
            echo "Ajustando permissões..."
            find . -type f -exec chmod 644 {} \;
            find . -type d -exec chmod 755 {} \;
            
            # 6.2. Permissões de escrita para pastas específicas (Doctrine/Logs)
            chmod -R 755 storage/ 2>/dev/null || true
            chmod -R 755 cache/ 2>/dev/null || true
            chmod -R 755 var/ 2>/dev/null || true
            
            # 6.3. Limpar caches do Doctrine se o binário existir
            if [ -f "vendor/bin/doctrine" ]; then
              echo "Limpando caches do Doctrine..."
              php vendor/bin/doctrine orm:clear-cache:metadata
              php vendor/bin/doctrine orm:clear-cache:query
              php vendor/bin/doctrine orm:clear-cache:result
            fi
            
            echo "Deploy finalizado com sucesso em smartreturns.com.br!"